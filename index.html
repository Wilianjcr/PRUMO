    <!-- FIREBASE SDK (compat) — carregamento dinâmico seguro   -->
    <!-- ======================================================= -->
    <script>
        var db = null; // será definido após carregamento do SDK

        function initFirebase() {
            try {
                var firebaseConfig = {
                    apiKey: "AIzaSyAoNnzwDgzemV5hV_j3hpT8ZrB4OvJBO38",
                    authDomain: "prumo-mocha.firebaseapp.com",
                    projectId: "prumo-mocha",
                    storageBucket: "prumo-mocha.firebasestorage.app",
                    messagingSenderId: "275208298962",
                    appId: "1:275208298962:web:723e76534f9210d620a80b"
                };
                if (!firebase.apps || !firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                console.log('[Prumo] Firebase inicializado ✓');
            } catch(e) {
                console.warn('[Prumo] Falha ao inicializar Firebase:', e.message);
                db = null;
            }
        }

        function carregarSDKFirebase(callback) {
            var s1 = document.createElement('script');
            s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
            s1.onload = function () {
                var s2 = document.createElement('script');
                s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
                s2.onload = function () {
                    initFirebase();
                    if (typeof callback === 'function') callback();
                };
                s2.onerror = function () {
                    console.warn('[Prumo] firebase-firestore-compat.js não carregou.');
                    if (typeof callback === 'function') callback();
                };
                document.head.appendChild(s2);
            };
            s1.onerror = function () {
                console.warn('[Prumo] firebase-app-compat.js não carregou. App funciona offline.');
                if (typeof callback === 'function') callback();
            };
            document.head.appendChild(s1);
        }
    </script>

    <style>
        :root { color-scheme: light dark; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            overscroll-behavior-y: none;
        }
        
        html.dark body { background-color: #111827; }

        h1, h2, h3, h4, .heading-font { font-family: 'Outfit', sans-serif; }

        @supports (-webkit-touch-callout: none) {
            input, select, textarea { font-size: 16px !important; }
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .view-hidden {
            opacity: 0; pointer-events: none; position: absolute;
            transform: translateX(10px); transition: opacity 0.25s ease, transform 0.25s ease;
            width: 100%; height: 100%; visibility: hidden;
        }
        .view-active {
            opacity: 1; pointer-events: auto; position: relative;
            transform: translateX(0); transition: opacity 0.25s ease, transform 0.25s ease;
            width: 100%; height: 100%; visibility: visible;
        }

        .toast-enter { transform: translateY(0) translateX(-50%); opacity: 1; }
        .toast-leave { transform: translateY(100px) translateX(-50%); opacity: 0; pointer-events: none; }

        .adm-table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: 'Inter', sans-serif; font-size: 13px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        .adm-table th, .adm-table td { border-bottom: 1px solid #e5e7eb; padding: 10px 12px; text-align: left; }
        .adm-table th { background-color: #f9fafb; font-weight: 700; color: #374151; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
        .adm-table tr:last-child td { border-bottom: none; }
        .adm-table .sector-header { background-color: #3e2723; color: white; font-weight: 800; text-transform: uppercase; text-align: center; letter-spacing: 0.1em; font-family: 'Outfit', sans-serif; }
        html.dark .adm-table { border-color: #374151; }
        html.dark .adm-table th { background-color: #1f2937; color: #d1d5db; border-bottom-color: #374151; }
        html.dark .adm-table td { border-bottom-color: #374151; color: #e5e7eb; }
        html.dark .adm-table .sector-header { background-color: #111827; }

        .quebra-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        .quebra-table th, .quebra-table td { border-bottom: 1px solid #e5e7eb; padding: 12px 8px; text-align: center; }
        .quebra-table th { font-weight: 700; text-transform: uppercase; color: #6b7280; font-size: 11px; letter-spacing: 0.05em; }
        .quebra-table input { width: 100%; background: transparent; text-align: center; font-weight: 700; outline: none; border: 1px solid transparent; border-radius: 8px; padding: 8px 4px; transition: all .2s ease; }
        .quebra-table input:focus { border-color: #b8865c; background: #fff; box-shadow: 0 0 0 2px rgba(184, 134, 92, 0.2); }
        .quebra-table input:hover:not(:focus) { background: #f3f4f6; }
        .highlight-yellow { color: #d97706 !important; font-weight: 900; }
        html.dark .quebra-table th, html.dark .quebra-table td { border-bottom-color: #374151; }
        html.dark .quebra-table th { color: #9ca3af; }
        html.dark .quebra-table input:focus { background: #1f2937; }
        html.dark .quebra-table input:hover:not(:focus) { background: #374151; }
        html.dark .highlight-yellow { color: #fbbf24 !important; }

        html.dark input[type="time"]::-webkit-calendar-picker-indicator,
        html.dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.7); cursor: pointer; }

        #save-indicator {
            position: fixed; bottom: 84px; right: 20px; background: rgba(16,185,129,0.95);
            color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
            padding: 6px 14px; border-radius: 9999px; opacity: 0; transform: translateY(10px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; z-index: 50; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        #save-indicator.visible { opacity: 1; transform: translateY(0); }

        /* Cloud sync indicator */
        #cloud-indicator {
            position: fixed; bottom: 84px; left: 20px; background: rgba(59,130,246,0.92);
            color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
            padding: 6px 14px; border-radius: 9999px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; z-index: 50; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.15);
        }
        #cloud-indicator.visible { opacity: 1; transform: translateY(0); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        html.dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        @media print {
            body { background: white !important; color: black !important; }
            #user-sidebar, header, #action-bar, footer,
            #view-menu, #view-submenu, #view-atividades, #view-productivity,
            #view-horimetro, #view-percentage, #view-divisao-quebra,
            #view-conv-mm, #view-conv-hz, #view-os, #view-requisicao, #view-op,
            .print-hide { display: none !important; }
            #modal-adm-email { display: block !important; position: static !important; background: transparent !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            #modal-adm-email > div { box-shadow: none !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .adm-table { border: 1px solid #000; width: 100%; }
        }
        
        /* Dia pills ADM */
        .dia-pill input:checked + span {
            background-color: #7c3aed;
            border-color: #7c3aed;
            color: white;
        }
        html.dark .dia-pill input:checked + span {
            background-color: #6d28d9;
            border-color: #6d28d9;
        }
        /* Setor pills ADM */
        .setor-pill input:checked + span {
            background-color: #0f172a;
            border-color: #0f172a;
            color: white;
        }
        html.dark .setor-pill input:checked + span {
            background-color: #e2e8f0;
            border-color: #e2e8f0;
            color: #0f172a;
        }
        /* Shift cards colaborador */
        .shift-card { cursor: pointer; transition: all 0.2s ease; }
        .shift-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -4px rgba(0,0,0,0.1); }
        .shift-card.selected { border-color: #f59e0b !important; background-color: #fffbeb !important; }
        html.dark .shift-card.selected { background-color: rgba(245,158,11,0.1) !important; }

        /* ── Drag & Drop Submenu ── */
        #submenu-grid { touch-action: none; }
        .submenu-card {
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .submenu-card.dragging {
            opacity: 0.4;
            transform: scale(0.95);
            box-shadow: none !important;
        }
        .submenu-card.drag-over {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px #6366f1, 0 8px 24px -4px rgba(99,102,241,0.3) !important;
        }
        .submenu-card.long-press-active {
            transform: scale(1.08) rotate(-1deg);
            box-shadow: 0 12px 32px -4px rgba(0,0,0,0.25) !important;
            z-index: 10;
        }
        #drag-hint {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(99,102,241,0.92); color: white; font-size: 11px; font-weight: 800;
            letter-spacing: 0.06em; padding: 8px 20px; border-radius: 999px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 60;
            white-space: nowrap;
        }
        #drag-hint.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Ring de progresso long press */
        .lp-ring {
            position: absolute; inset: 0; border-radius: inherit;
            pointer-events: none; overflow: hidden;
        }
        .lp-ring::after {
            content: '';
            position: absolute; inset: 0;
            background: conic-gradient(rgba(99,102,241,0.35) var(--lp, 0%), transparent 0%);
            border-radius: inherit;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        html.dark .glass-panel {
            background: rgba(31, 41, 55, 0.9);
        }
    </style>
</head>
